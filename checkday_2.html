<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체크데이 상담지</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #fff; --surface2: #f0efe9;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
  --text: #1c1c18; --text2: #5c5c56; --text3: #9c9c94;
  --blue: #3478D4; --blue-bg: #EBF2FC; --blue-fg: #1A4E96;
  --green-bg: #E8F5DE; --green-fg: #2E6B0E;
  --orange-bg: #FDF0E0; --orange-fg: #8A5000;
  --red-bg: #FCEAEA; --red-fg: #A82B2B;
  --r: 10px; --rlg: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a16; --surface: #232320; --surface2: #2c2c28;
    --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.16);
    --text: #f0efe8; --text2: #a0a098; --text3: #606058;
    --blue-bg: #0D3868; --blue-fg: #7EB3F5;
    --green-bg: #1A3A0A; --green-fg: #7DC450;
    --orange-bg: #3A2800; --orange-fg: #F5A830;
    --red-bg: #3A1010; --red-fg: #F57070;
  }
}
body { font-family: -apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:1.5rem 1rem 5rem; }
.container { max-width:640px; margin:0 auto; }

/* ── 헤더 ── */
.page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.25rem; }
.page-header h1 { font-size:20px; font-weight:600; letter-spacing:-0.3px; }
.page-header p { font-size:12px; color:var(--text3); margin-top:3px; }
.date-badge { font-size:11px; font-weight:600; background:var(--blue-bg); color:var(--blue-fg); padding:4px 10px; border-radius:99px; white-space:nowrap; }

/* ── 회원 바 ── */
.member-bar { background:var(--surface); border:0.5px solid var(--border2); border-radius:var(--rlg); padding:.875rem 1rem; display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:1rem; }
.mf label { font-size:10px; font-weight:600; color:var(--text3); display:block; margin-bottom:4px; letter-spacing:.4px; text-transform:uppercase; }
.mf input { width:100%; font-size:14px; font-weight:500; background:none; border:none; border-bottom:.5px solid var(--border2); color:var(--text); font-family:inherit; outline:none; padding:2px 0 4px; }
.mf input::placeholder { color:var(--text3); font-weight:400; }

/* ── 총점 바 ── */
.total-bar { background:var(--surface); border:.5px solid var(--border2); border-radius:var(--rlg); padding:1rem 1.25rem; display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
.tl { flex-shrink:0; }
.tl-label { font-size:10px; font-weight:600; color:var(--text3); letter-spacing:.5px; text-transform:uppercase; }
.tl-num { font-size:32px; font-weight:600; letter-spacing:-1px; line-height:1.1; }
.tl-num span { font-size:14px; font-weight:400; color:var(--text3); }
.tr { flex:1; }
.prog-track { height:5px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-bottom:7px; }
.prog-fill { height:100%; border-radius:99px; background:var(--blue); transition:width .35s; }
.total-grade { display:flex; align-items:center; gap:8px; }
.grade-pill { font-size:12px; font-weight:600; padding:3px 10px; border-radius:99px; }
.grade-hint { font-size:11px; color:var(--text3); }

/* ── 섹션 공통 ── */
.section { margin-bottom:.875rem; }
.sec-header { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.sec-num { width:22px; height:22px; border-radius:50%; background:var(--text); color:var(--surface); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sec-title { font-size:14px; font-weight:600; }
.sec-sub { font-size:11px; color:var(--text3); margin-left:auto; }
.card { background:var(--surface); border:.5px solid var(--border); border-radius:var(--rlg); overflow:hidden; }

/* ── 인바디 ── */
.ib-grid { display:grid; grid-template-columns:1fr 1fr 1fr; }
.ib-cell { padding:11px 13px; border-right:.5px solid var(--border); border-bottom:.5px solid var(--border); }
.ib-cell:nth-child(3n) { border-right:none; }
.ib-cell.no-border-b { border-bottom:none; }
.ib-cell label { font-size:10px; font-weight:600; color:var(--text3); display:block; margin-bottom:4px; letter-spacing:.3px; }
.ib-num { width:100%; font-size:16px; font-weight:600; background:none; border:none; color:var(--text); font-family:inherit; outline:none; padding:0; }
.ib-num::placeholder { color:var(--text3); font-weight:400; font-size:14px; }
.ib-tag { display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:99px; margin-top:3px; }
.ib-comment-row { padding:9px 13px; border-top:.5px solid var(--border); display:flex; gap:8px; align-items:flex-start; }
.ib-comment-lbl { font-size:11px; color:var(--text3); white-space:nowrap; padding-top:2px; }
textarea.ib-comment { flex:1; font-size:13px; background:none; border:none; color:var(--text); font-family:inherit; outline:none; resize:none; min-height:32px; }
textarea.ib-comment::placeholder { color:var(--text3); }

/* ── 평가 아이템 (공통) ── */
.eval-item { border-bottom:.5px solid var(--border); padding:10px 13px; }
.eval-item:last-child { border-bottom:none; }
.eval-top { display:flex; align-items:center; gap:10px; margin-bottom:7px; }
.eval-num-badge { width:20px; height:20px; border-radius:50%; background:var(--surface2); font-size:10px; font-weight:700; color:var(--text3); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.eval-name { font-size:13px; font-weight:600; flex:1; }
.eval-desc { font-size:11px; color:var(--text3); margin-bottom:6px; }
.score-ctrl { display:flex; align-items:center; gap:5px; flex-shrink:0; }
.score-btn { width:26px; height:26px; border-radius:50%; border:.5px solid var(--border2); background:var(--surface); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .1s,transform .1s; user-select:none; }
.score-btn:hover { background:var(--surface2); }
.score-btn:active { transform:scale(.88); }
.score-val { font-size:16px; font-weight:600; min-width:20px; text-align:center; }
.sdots { display:flex; gap:3px; margin-left:3px; }
.dot { width:5px; height:5px; border-radius:50%; background:var(--border2); transition:background .15s; }
.dot.on { background:var(--blue); }
.tag-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:6px; }
.ctag { font-size:11px; padding:4px 9px; border-radius:99px; border:.5px solid var(--border2); background:var(--surface2); color:var(--text2); cursor:pointer; user-select:none; transition:all .12s; }
.ctag.on { background:var(--red-bg); color:var(--red-fg); border-color:var(--red-fg); }
.fbtag.on { background:var(--orange-bg); color:var(--orange-fg); border-color:var(--orange-fg); }
textarea.eval-memo { width:100%; font-size:12px; font-family:inherit; background:var(--surface2); border:.5px solid var(--border); border-radius:6px; padding:6px 9px; color:var(--text); resize:none; outline:none; min-height:40px; }
textarea.eval-memo::placeholder { color:var(--text3); }
.expand-toggle { width:100%; display:flex; align-items:center; gap:5px; padding:5px 0 0; background:none; border:none; color:var(--text3); font-size:11px; cursor:pointer; font-family:inherit; text-align:left; }
.expand-toggle .arr { transition:transform .18s; display:inline-block; }
.expand-toggle.open .arr { transform:rotate(180deg); }
.sub-panel { display:none; margin-top:6px; }
.sub-panel.open { display:block; }

/* ── 목표 ── */
.goal-tags { display:flex; flex-wrap:wrap; gap:6px; padding:12px 13px; border-bottom:.5px solid var(--border); }
.goal-tag { font-size:12px; padding:6px 12px; border-radius:99px; border:.5px solid var(--border2); background:var(--surface2); color:var(--text2); cursor:pointer; user-select:none; transition:all .12s; font-weight:500; }
.goal-tag.on { background:var(--blue-bg); color:var(--blue-fg); border-color:var(--blue-fg); }
.goal-memo-wrap { padding:9px 13px; }
textarea.goal-memo { width:100%; font-size:13px; font-family:inherit; background:none; border:none; color:var(--text); resize:none; outline:none; min-height:44px; }
textarea.goal-memo::placeholder { color:var(--text3); }

/* ── 상담 메모 ── */
textarea.consult-memo { width:100%; font-size:13px; font-family:inherit; background:none; border:none; color:var(--text); resize:none; outline:none; min-height:72px; padding:12px 13px; }
textarea.consult-memo::placeholder { color:var(--text3); }

/* ── 버튼 ── */
.actions { display:flex; gap:8px; margin-top:1.25rem; flex-wrap:wrap; }
.btn { padding:9px 18px; border-radius:var(--r); font-size:13px; font-weight:500; font-family:inherit; cursor:pointer; border:.5px solid var(--border2); transition:background .12s,transform .1s; }
.btn:active { transform:scale(.97); }
.btn-ghost { background:var(--surface); color:var(--text2); }
.btn-ghost:hover { background:var(--surface2); }
.btn-primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-primary:hover { opacity:.88; }

/* ── 모달 ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; padding:1rem; }
.overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:var(--rlg); padding:1.5rem; max-width:480px; width:100%; max-height:82vh; overflow-y:auto; }
.modal h3 { font-size:15px; font-weight:600; margin-bottom:1rem; }
.rline { font-size:13px; padding:6px 0; border-bottom:.5px solid var(--border); }
.rline:last-of-type { border-bottom:none; }
.rlabel { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
.modal-footer { display:flex; gap:8px; margin-top:1.25rem; justify-content:flex-end; }

/* ── 구분선 ── */
.divider { display:flex; align-items:center; gap:8px; margin:1.25rem 0 .75rem; color:var(--text3); font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; }
.divider::before,.divider::after { content:''; flex:1; height:.5px; background:var(--border2); }

@media (max-width:480px) {
  .ib-grid { grid-template-columns:1fr 1fr; }
  .ib-cell:nth-child(3n) { border-right:.5px solid var(--border); }
  .ib-cell:nth-child(2n) { border-right:none; }
  .member-bar { grid-template-columns:1fr 1fr; }
}
@media print { .actions,.overlay { display:none!important; } body { padding:.75rem; } }

  /* ── 동작 피드백 추가/편집 ── */
  .add-fb-btn {
    width:100%; margin-top:6px; padding:9px;
    background:none; border:.5px dashed var(--border2);
    border-radius:var(--r); color:var(--text2);
    font-size:13px; font-family:inherit;
    cursor:pointer; transition:background .15s;
  }
  .add-fb-btn:hover { background:var(--surface2); }

  .fb-item { border-bottom:.5px solid var(--border); padding:10px 13px; }
  .fb-item:last-child { border-bottom:none; }
  .fb-item-header { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .fb-move-input {
    flex:1; font-size:13px; font-weight:600;
    background:none; border:none; border-bottom:.5px solid var(--border2);
    color:var(--text); font-family:inherit; outline:none; padding:2px 0 4px;
  }
  .fb-move-input::placeholder { color:var(--text3); font-weight:400; }
  .fb-del-btn {
    background:none; border:none; color:var(--text3);
    cursor:pointer; font-size:15px; padding:0 2px; line-height:1;
    transition:color .12s;
  }
  .fb-del-btn:hover { color:var(--red-fg); }
  .fb-check-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .fb-check-input {
    flex:1; font-size:12px; background:none;
    border:none; border-bottom:.5px solid var(--border);
    color:var(--text); font-family:inherit; outline:none; padding:3px 0;
  }
  .fb-check-input::placeholder { color:var(--text3); }
  .fb-check-del {
    background:none; border:none; color:var(--text3);
    cursor:pointer; font-size:13px; padding:0; line-height:1;
  }
  .fb-check-del:hover { color:var(--red-fg); }
  .add-check-btn {
    font-size:11px; color:var(--blue); background:none;
    border:none; cursor:pointer; padding:2px 0;
    font-family:inherit; margin-top:2px; display:block;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 헤더 -->
  <div class="page-header">
    <div>
      <h1>체크데이 상담지</h1>
      <p>그룹 트레이닝 격월 점검 · 30분</p>
    </div>
    <div class="date-badge" id="date-badge"></div>
  </div>

  <!-- 회원 정보 -->
  <div class="member-bar">
    <div class="mf"><label>회원 이름</label><input id="m-name" type="text" placeholder="홍길동"></div>
    <div class="mf"><label>회차</label><input id="m-session" type="text" placeholder="2025-06 (2회차)"></div>
    <div class="mf"><label>트레이너</label><input id="m-trainer" type="text" placeholder="김지훈"></div>
  </div>

  <!-- 움직임 총점 -->
  <div class="total-bar">
    <div class="tl">
      <div class="tl-label">움직임 총점</div>
      <div class="tl-num" id="total-num">0 <span>/ 24</span></div>
    </div>
    <div class="tr">
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="total-grade">
        <div class="grade-pill" id="grade-pill" style="background:var(--surface2);color:var(--text3);">평가 전</div>
        <span class="grade-hint" id="grade-hint"></span>
      </div>
    </div>
  </div>

  <!-- ① 인바디 -->
  <div class="section">
    <div class="sec-header">
      <div class="sec-num">1</div>
      <div class="sec-title">인바디 확인</div>
      <div class="sec-sub">체성분 수치 입력</div>
    </div>
    <div class="card">
      <div class="ib-grid">
        <div class="ib-cell"><label>체중 (kg)</label><input class="ib-num" id="ib-w" type="number" placeholder="65.0" step="0.1" oninput="updIb()"><div id="tag-w"></div></div>
        <div class="ib-cell"><label>골격근량 (kg)</label><input class="ib-num" id="ib-m" type="number" placeholder="28.0" step="0.1" oninput="updIb()"><div id="tag-m"></div></div>
        <div class="ib-cell"><label>체지방량 (kg)</label><input class="ib-num" id="ib-fat" type="number" placeholder="18.0" step="0.1" oninput="updIb()"><div id="tag-fat"></div></div>
        <div class="ib-cell no-border-b"><label>BMI</label><input class="ib-num" id="ib-bmi" type="number" placeholder="23.5" step="0.1" oninput="updIb()"><div id="tag-bmi"></div></div>
        <div class="ib-cell no-border-b"><label>체지방률 (%)</label><input class="ib-num" id="ib-bfp" type="number" placeholder="27.0" step="0.1" oninput="updIb()"><div id="tag-bfp"></div></div>
        <div class="ib-cell no-border-b"><label>기초대사량 (kcal)</label><input class="ib-num" id="ib-bmr" type="number" placeholder="1450" oninput="updIb()"><div id="tag-bmr"></div></div>
      </div>
      <!-- 내장지방 -->
      <div style="padding:10px 13px;border-top:.5px solid var(--border);display:flex;align-items:center;gap:12px;">
        <div style="flex:0 0 auto;">
          <label style="font-size:10px;font-weight:600;color:var(--text3);display:block;margin-bottom:4px;letter-spacing:.3px;">내장지방 레벨</label>
          <input class="ib-num" id="ib-vis" type="number" placeholder="8" min="1" max="20" oninput="updIb()" style="width:70px;">
        </div>
        <div id="tag-vis" style="padding-top:18px;"></div>
      </div>
      <div class="ib-comment-row">
        <span class="ib-comment-lbl">코멘트</span>
        <textarea class="ib-comment" id="ib-comment" placeholder="지난 회차 대비 변화, 방향 코멘트 (예: 근육↑ 체지방↓ 유지 잘 됨)"></textarea>
      </div>
    </div>
  </div>

  <!-- ② 움직임 평가 -->
  <div class="section">
    <div class="sec-header">
      <div class="sec-num">2</div>
      <div class="sec-title">움직임 평가</div>
      <div class="sec-sub">8개 항목 · 각 0–3점</div>
    </div>
    <div class="card" id="eval-cards"></div>
  </div>

  <!-- ③ 다음 목표 -->
  <div class="section">
    <div class="sec-header">
      <div class="sec-num">3</div>
      <div class="sec-title">다음 목표 / 방향</div>
      <div class="sec-sub">태그 선택 + 메모</div>
    </div>
    <div class="card">
      <div class="goal-tags">
        <div class="goal-tag" onclick="this.classList.toggle('on')">💪 근력 향상</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">🔥 체지방 감소</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">🧘 자세 교정</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">🏃 체력 향상</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">⚖️ 체중 유지</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">🦵 하체 강화</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">🤸 유연성 개선</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">🩺 통증 개선</div>
        <div class="goal-tag" onclick="this.classList.toggle('on')">📈 근육량 증가</div>
      </div>
      <div class="goal-memo-wrap">
        <textarea class="goal-memo" id="goal-memo" placeholder="구체적인 방향이나 다음 회차까지의 목표를 기록하세요..."></textarea>
      </div>
    </div>
  </div>

  <!-- ④ 동작 피드백 -->
  <div class="section">
    <div class="sec-header">
      <div class="sec-num">4</div>
      <div class="sec-title">동작 피드백</div>
      <div class="sec-sub">동작 추가/삭제 가능</div>
    </div>
    <div class="card" id="fb-cards"></div>
    <button class="add-fb-btn" onclick="addFbItem()">+ 동작 추가</button>
  </div>

  <!-- ⑤ 종합 상담 메모 -->
  <div class="section">
    <div class="sec-header">
      <div class="sec-num">5</div>
      <div class="sec-title">종합 상담 메모</div>
      <div class="sec-sub">특이사항 · 요청사항</div>
    </div>
    <div class="card">
      <textarea class="consult-memo" id="consult-memo" placeholder="부상 이력, 생활 패턴, 회원 요청, 다음 체크데이 주의사항 등..."></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-ghost" onclick="resetAll()">초기화</button>
    <button class="btn btn-ghost" onclick="openReport()">📋 결과 보기</button>
    <button class="btn btn-primary" onclick="window.print()">인쇄 / PDF</button>
  </div>
</div>

<!-- 결과 모달 -->
<div class="overlay" id="overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h3>체크데이 결과 요약</h3>
    <div id="report-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('overlay').classList.remove('open')">닫기</button>
      <button class="btn btn-primary" onclick="copyReport()">텍스트 복사</button>
    </div>
  </div>
</div>

<script>
// ── 날짜 ──
const today = new Date();
document.getElementById('date-badge').textContent =
  today.getFullYear()+'.'+String(today.getMonth()+1).padStart(2,'0')+'.'+String(today.getDate()).padStart(2,'0');

// ── 움직임 평가 데이터 ──
const evals = [
  { name:'호흡 테스트', desc:'늑골 · 복압 평가',
    checks:['허리 과도하게 뜸','허벅지 수직 안 섬','엉덩이 과도하게 뜸','갈비뼈 과도하게 올라감','내쉴 때 늑골 안 내려감'] },

  const l=ranges[ranges.length-1]; return `<span class="ib-tag" style="background:${l.bg};color:${l.fg}">${l.label}</span>`;
}

// ── VO₂ 계산 (8번 항목에만) ──
function calcVo2() {
  const age=parseFloat(document.getElementById('vo2-age').value);
  const ht=parseFloat(document.getElementById('vo2-ht').value);
  const wt=parseFloat(document.getElementById('vo2-wt').value);
  const hr=parseFloat(document.getElementById('vo2-hr').value);
  if([age,ht,wt,hr].some(isNaN)){document.getElementById('vo2-result').style.display='none';return;}
  const v=(54.337-0.185*age+0.097*ht-0.246*wt-0.112*hr);
  const vr=Math.round(v*10)/10;
  // grade
  const norms=[
    {ageMax:25,exc:56,good:47,abv:42,avg:38,blw:33,poor:28},
    {ageMax:35,exc:52,good:45,abv:39,avg:35,blw:31,poor:26},
    {ageMax:45,exc:45,good:38,abv:34,avg:31,blw:27,poor:22},
    {ageMax:55,exc:40,good:34,abv:31,avg:28,blw:25,poor:20},
    {ageMax:65,exc:37,good:32,abv:28,avg:25,blw:22,poor:18},
    {ageMax:999,exc:32,good:28,abv:25,avg:22,blw:19,poor:17},
  ];
  const n=norms.find(x=>age<=x.ageMax)||norms[norms.length-1];
  let gl,gb,gf;
  if(vr>n.exc){gl='Excellent';gb='var(--green-bg)';gf='var(--green-fg)';}
  else if(vr>=n.good){gl='Good';gb='var(--blue-bg)';gf='var(--blue-fg)';}
  else if(vr>=n.abv){gl='Above avg';gb='var(--blue-bg)';gf='var(--blue-fg)';}
  else if(vr>=n.avg){gl='Average';gb='var(--orange-bg)';gf='var(--orange-fg)';}
  else if(vr>=n.blw){gl='Below avg';gb='var(--orange-bg)';gf='var(--orange-fg)';}
  else if(vr>=n.poor){gl='Poor';gb='var(--red-bg)';gf='var(--red-fg)';}
  else{gl='Very poor';gb='var(--red-bg)';gf='var(--red-fg)';}
  document.getElementById('vo2-val').textContent=vr.toFixed(1)+' ml/kg/min';
  const badge=document.getElementById('vo2-badge');
  badge.textContent=gl; badge.style.background=gb; badge.style.color=gf;
  document.getElementById('vo2-result').style.display='flex';
}

function toggleExpand(i) {
  const sp=document.getElementById(`sp-${i}`);
  const et=document.getElementById(`et-${i}`);
  sp.classList.toggle('open');
  et.classList.toggle('open');
}

function adj(i,d) {
  scores[i]=Math.max(0,Math.min(3,scores[i]+d));
  document.getElementById(`sv-${i}`).textContent=scores[i];
  for(let j=0;j<4;j++) document.getElementById(`dot-${i}-${j}`).classList.toggle('on',j<scores[i]);
  updateTotal();
}

function updateTotal() {
  const tot=scores.reduce((a,b)=>a+b,0);
  const max=24; const pct=Math.round(tot/max*100);
  document.getElementById('total-num').innerHTML=`${tot} <span>/ ${max}</span>`;
  document.getElementById('prog-fill').style.width=pct+'%';
  const pill=document.getElementById('grade-pill');
  const hint=document.getElementById('grade-hint');
  let label,bg,fg,h;
  if(tot===0){label='평가 전';bg='var(--surface2)';fg='var(--text3)';h='';}
  else if(pct>=83){label='우수';bg='var(--green-bg)';fg='var(--green-fg)';h='전반적으로 안정적인 패턴';}
  else if(pct>=58){label='양호';bg='var(--blue-bg)';fg='var(--blue-fg)';h='일부 패턴 보완 필요';}
  else if(pct>=33){label='보통';bg='var(--orange-bg)';fg='var(--orange-fg)';h='주요 패턴 집중 개선 권장';}
  else{label='개선 필요';bg='var(--red-bg)';fg='var(--red-fg)';h='기초 움직임 패턴 재교육 필요';}
  pill.textContent=label; pill.style.background=bg; pill.style.color=fg; hint.textContent=h;
}

let fbIdCounter = 0;

function makeFbCheckRow(text='') {
  return `<div class="fb-check-row">
    <input type="checkbox" style="accent-color:var(--blue);flex-shrink:0;">
    <input class="fb-check-input" type="text" value="${text}" placeholder="체크 항목...">
    <button class="fb-check-del" onclick="this.parentElement.remove()" title="삭제">✕</button>
  </div>`;
}

function addCheckToFb(btn) {
  const checksWrap = btn.previousElementSibling;
  const div = document.createElement('div');
  div.innerHTML = makeFbCheckRow();
  checksWrap.appendChild(div.firstElementChild);
  checksWrap.lastElementChild.querySelector('.fb-check-input').focus();
}

function addFbItem(preset) {
  fbIdCounter++;
  const id = fbIdCounter;
  const c = document.getElementById('fb-cards');
  const div = document.createElement('div');
  div.className = 'fb-item';
  div.id = `fb-item-${id}`;
  const name = preset ? preset.name : '';
  const checks = preset ? preset.checks : [''];
  const checksHTML = checks.map(ch => makeFbCheckRow(ch)).join('');
  div.innerHTML = `
    <div class="fb-item-header">
      <input class="fb-move-input" type="text" value="${name}" placeholder="동작명 (예: 스쿼트)">
      <button class="fb-del-btn" onclick="document.getElementById('fb-item-${id}').remove()" title="삭제">✕</button>
    </div>
    <div class="fb-checks-wrap">${checksHTML}</div>
    <button class="add-check-btn" onclick="addCheckToFb(this)">+ 체크 항목 추가</button>
    <textarea class="eval-memo" placeholder="코칭 포인트 메모..." style="margin-top:6px;"></textarea>`;
  c.appendChild(div);
}

function buildFeedbacks() {
  feedbacks.forEach(fb => addFbItem(fb));
}

function getFbLines() {
  return [...document.querySelectorAll('.fb-item')].map(item => {
    const name = item.querySelector('.fb-move-input').value || '(동작명 없음)';
    const checked = [...item.querySelectorAll('.fb-check-row')].filter(row => row.querySelector('input[type=checkbox]').checked).map(row => row.querySelector('.fb-check-input').value).filter(Boolean);
    const memo = item.querySelector('.eval-memo').value;
    if (!checked.length && !memo) return null;
    return { name, checked, memo };
  }).filter(Boolean);
}

// ── 초기화 ──
function resetAll() {
  if(!confirm('이 회원의 상담 내용을 모두 초기화할까요?')) return;
  document.querySelectorAll('input[type=text],input[type=number],textarea').forEach(el=>el.value='');
  document.querySelectorAll('.ctag,.fbtag,.goal-tag').forEach(el=>el.classList.remove('on'));
  scores.fill(0);
  evals.forEach((_,i)=>{
    document.getElementById(`sv-${i}`).textContent='0';
    for(let j=0;j<4;j++) document.getElementById(`dot-${i}-${j}`).classList.remove('on');
  });
  ['tag-w','tag-m','tag-fat','tag-bmi','tag-bfp','tag-bmr','tag-vis','vo2-result'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML=el.tagName==='DIV'&&el.id==='vo2-result'? (el.style.display='none','') : '';
  });
  // 피드백 초기화 후 재빌드
  const fbCards = document.getElementById('fb-cards');
  fbCards.innerHTML = '';
  fbIdCounter = 0;
  buildFeedbacks();
  updateTotal();
}

    document.getElementById('consult-memo').value?`━ 상담 메모: ${document.getElementById('consult-memo').value}`:'',
  ].filter(l=>l!=='');
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>alert('복사되었습니다!'))
    .catch(()=>alert('직접 선택해서 복사해 주세요.'));
}

buildEvals();
buildFeedbacks();
updateTotal();
</script>
</body>
